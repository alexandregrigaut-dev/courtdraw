<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to CourtDraw Pro</title>
  <meta name="robots" content="noindex">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CourtDraw">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a1628;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .card { max-width: 480px; width: 100%; }
    .icon {
      width: 72px; height: 72px; border-radius: 20px;
      background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 24px;
    }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.03em; }
    p { color: #94a3b8; margin-bottom: 32px; line-height: 1.6; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #3b82f6; color: #ffffff;
      padding: 14px 32px; border-radius: 12px;
      text-decoration: none; font-weight: 700; font-size: 1rem;
      transition: background 0.15s, transform 0.15s;
    }
    .btn:hover { background: #60a5fa; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1 id="success-title">You're all set!</h1>
    <p id="success-body">Your subscription is now active.</p>
    <a class="btn" href="/courtdraw-app.html">Open the app →</a>
  </div>
  <script>
    const params    = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    if (!sessionId) window.location.href = '/';
    // Optimistic update — shows Pro immediately while webhook processes in the background
    localStorage.setItem('courtdraw_pro', '1');
    // Detect plan type and trial status from URL params
    const plan    = params.get('plan');
    const isTrial = params.get('trial') === 'true';
    const value   = parseFloat(params.get('value') || '0');

    if (plan === 'club' && isTrial) {
      document.getElementById('success-title').textContent = 'Your 7-Day Club Trial Has Started!';
      document.getElementById('success-body').textContent  = 'You have full Club access for 7 days — no charge until your trial ends. Go explore the shared library, invite your coaches, and set up your club branding. Cancel anytime before day 7 and you won\'t be billed.';
      document.querySelector('.btn').href = '/club-admin.html';
      document.querySelector('.btn').textContent = 'Open Club Admin →';
    } else if (plan === 'club') {
      document.getElementById('success-title').textContent = 'Welcome to CourtDraw Club!';
      document.getElementById('success-body').textContent  = 'Your Club plan is active. All Pro features are unlocked plus your shared team library, club branding on exports, and the admin dashboard.';
      document.querySelector('.btn').href = '/club-admin.html';
      document.querySelector('.btn').textContent = 'Open Club Admin →';
    } else if (plan === 'pro' && isTrial) {
      document.getElementById('success-title').textContent = 'Your 7-Day Pro Trial Has Started!';
      document.getElementById('success-body').textContent  = 'You have full Pro access for 7 days — no charge until your trial ends. All 38+ courts, unlimited saves, clean PNG exports, and more are unlocked. Cancel anytime before day 7 and you won\'t be billed.';
    } else {
      document.getElementById('success-title').textContent = 'Welcome to CourtDraw Pro!';
      document.getElementById('success-body').textContent  = 'Your subscription is active. All 38+ courts, unlimited saves, clean PNG exports, and more are now unlocked.';
    }

    // ── Meta Pixel — conversion events ───────────────────────────────────────
    // Trials fire StartTrial (no charge yet); paid plans fire Purchase with exact EUR value.
    if (typeof fbq === 'function') {
      if (isTrial) {
        const trialName = plan === 'club' ? 'Club Trial' : 'Pro Trial';
        fbq('track', 'StartTrial', { content_name: trialName, currency: 'EUR', value: 0 });
      } else {
        const contentName = plan === 'club' ? 'Club Plan' : 'Pro Plan';
        fbq('track', 'Purchase', { content_name: contentName, currency: 'EUR', value });
      }
    }

    // ── Google Analytics — purchase / trial_start key events ─────────────────
    // GA4 'purchase' is a standard recommended key event (mark it in GA4 → Admin → Events).
    // 'pro_trial_start' / 'club_trial_start' should also be marked as key events.
    if (typeof gtag === 'function') {
      if (isTrial) {
        gtag('event', plan === 'club' ? 'club_trial_start' : 'pro_trial_start', {
          currency: 'EUR', value: 0, plan
        });
      } else {
        gtag('event', 'purchase', {
          transaction_id: sessionId,
          value,
          currency: 'EUR',
          items: [{ item_id: plan, item_name: plan === 'club' ? 'Club Plan' : 'Pro Plan', price: value, quantity: 1 }]
        });
      }
    }
  </script>
</body>
</html>
