<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to CourtDraw Pro</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CourtDraw">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .card { max-width: 480px; width: 100%; }
    .icon {
      width: 72px; height: 72px; border-radius: 20px;
      background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 24px;
    }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.03em; }
    p { color: #94a3b8; margin-bottom: 32px; line-height: 1.6; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #22c55e; color: #0b1120;
      padding: 14px 32px; border-radius: 12px;
      text-decoration: none; font-weight: 700; font-size: 1rem;
      transition: background 0.15s, transform 0.15s;
    }
    .btn:hover { background: #4ade80; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>You're now CourtDraw Pro</h1>
    <p>Your account has been upgraded. All Pro features are now unlocked — all 37+ courts, unlimited saves, and clean PNG exports.</p>
    <a class="btn" href="/courtdraw-app.html">Open the app →</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (!params.get('session_id')) window.location.href = '/';
    // Optimistic update — shows Pro immediately while webhook processes in the background
    localStorage.setItem('courtdraw_pro', '1');
  </script>
</body>
</html>
