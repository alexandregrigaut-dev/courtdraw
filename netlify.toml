[build]
  publish = "."
  functions = "netlify/functions"

# Point 5 — Drip email sequence: runs daily at 09:00 UTC
# Sends Day 2 / Day 5 / Day 10 nudge emails to free users
[functions."drip-emails"]
  schedule = "0 9 * * *"

# Firebase client-side API keys are intentionally public — they are not secrets.
# Firebase security is enforced by Firebase Security Rules, not key secrecy.
# This disables Netlify's false-positive secret scanning failure for this repo.
[build.environment]
  NETLIFY_SKIP_SECRETS_SCANNING = "true"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "https://www.courtdraw.app/*"
  to = "https://courtdraw.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/privacy"
  to   = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to   = "/terms.html"
  status = 200

[[redirects]]
  from = "/cookies"
  to   = "/privacy.html"
  status = 301

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
