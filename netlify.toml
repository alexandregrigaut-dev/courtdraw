[build]
  publish = "."
  functions = "netlify/functions"

# Point 5 — Drip email sequence: runs daily at 09:00 UTC
# Sends Day 2 / Day 5 / Day 10 nudge emails to free users
[functions."drip-emails"]
  schedule = "0 9 * * *"

# R-3 — Weekly digest: runs every Monday at 08:00 UTC
# Sends "Your plays this week" recap to Pro/Club users, nudge to free users
[functions."weekly-digest"]
  schedule = "0 8 * * 1"

# Firebase client-side API keys are intentionally public — they are not secrets.
# Firebase security is enforced by Firebase Security Rules, not key secrecy.
# This disables Netlify's false-positive secret scanning failure for this repo.
[build.environment]
  NETLIFY_SKIP_SECRETS_SCANNING = "true"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "https://www.courtdraw.app/*"
  to = "https://courtdraw.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/privacy"
  to   = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to   = "/terms.html"
  status = 200

[[redirects]]
  from = "/cookies"
  to   = "/privacy.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Broad but safe CSP: allows inline scripts (app uses them extensively),
    # Firebase, Stripe, Google/Meta analytics, Resend, Bunny Fonts.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net https://js.stripe.com https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.bunny.net https://fonts.googleapis.com; font-src 'self' https://fonts.bunny.net https://fonts.gstatic.com; img-src 'self' data: blob: https://www.facebook.com https://api.producthunt.com https://firebasestorage.googleapis.com; connect-src 'self' https://firebaseinstallations.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com https://www.facebook.com; worker-src 'self'; manifest-src 'self'; frame-src 'none';"
