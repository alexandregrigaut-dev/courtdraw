[build]
  publish = "."
  functions = "netlify/functions"

# Point 5 — Drip email sequence: runs daily at 09:00 UTC
# Sends Day 2 / Day 5 / Day 10 nudge emails to free users
[functions."drip-emails"]
  schedule = "0 9 * * *"

# R-3 — Weekly digest: runs every Monday at 08:00 UTC
# Sends personalised play recap to Pro/Club users; re-engagement nudge to free users
[functions."weekly-digest"]
  schedule = "0 8 * * 1"

# R-4 — Re-engagement emails: runs daily at 10:00 UTC (offset from drip-emails)
# Email 1: zero session plans after 7 days (plan-aware copy)
# Email 2: zero plays after 7 days (all registered users)
[functions."reengagement-emails"]
  schedule = "0 10 * * *"

# Firebase client-side API keys are intentionally public — they are not secrets.
# Firebase security is enforced by Firebase Security Rules, not key secrecy.
# This disables Netlify's false-positive secret scanning failure for this repo.
[build.environment]
  NETLIFY_SKIP_SECRETS_SCANNING = "true"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "https://www.courtdraw.app/*"
  to = "https://courtdraw.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/privacy"
  to   = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to   = "/terms.html"
  status = 200

[[redirects]]
  from = "/cookies"
  to   = "/privacy.html"
  status = 301

[[redirects]]
  from = "/app"
  to   = "/courtdraw-app.html"
  status = 200

[[redirects]]
  from = "/community"
  to   = "/community.html"
  status = 200

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
