<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>
  <!-- Court outline -->
  <rect x="64" y="156" width="384" height="200" rx="6" fill="none" stroke="#22c55e" stroke-width="18"/>
  <!-- Centre line -->
  <line x1="256" y1="156" x2="256" y2="356" stroke="#22c55e" stroke-width="14"/>
  <!-- Centre circle -->
  <circle cx="256" cy="256" r="52" fill="none" stroke="#22c55e" stroke-width="10"/>
  <!-- Left penalty area -->
  <rect x="64" y="206" width="88" height="100" fill="none" stroke="#22c55e" stroke-width="10"/>
  <!-- Right penalty area -->
  <rect x="360" y="206" width="88" height="100" fill="none" stroke="#22c55e" stroke-width="10"/>
  <!-- Tactical arrow -->
  <path d="M180 310 C220 290, 240 260, 300 230" fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <polygon points="300,218 322,238 294,244" fill="#22c55e"/>
</svg>
