<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — CourtDraw</title>
  <meta name="robots" content="noindex">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CourtDraw">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a1628; --bg2: #0d1f3c; --bg3: #1a2d4a;
      --border: #1a2d4a; --border2: #2a3f5c;
      --text: #f1f5f9; --muted: #94a3b8;
      --accent: #3b82f6; --red: #ef4444;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .logo-wrap {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.4rem; font-weight: 800; letter-spacing: -0.03em;
      text-decoration: none; color: var(--text);
      margin-bottom: 40px;
    }
    .logo-mark {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }

    .card {
      width: 100%; max-width: 420px;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 20px; padding: 40px 36px;
    }
    @media (max-width: 480px) { .card { padding: 32px 24px; } }

    .card-header { margin-bottom: 28px; }
    .card-header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 6px; }
    .card-header p { color: var(--muted); font-size: 0.875rem; }

    .tabs {
      display: flex; border-bottom: 1px solid var(--border2);
      margin-bottom: 28px; gap: 0;
    }
    .tab {
      flex: 1; padding: 10px; text-align: center;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
      color: var(--muted); border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      background: none; border-top: none; border-left: none; border-right: none;
      font-family: inherit;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .form-group { margin-bottom: 18px; }
    label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: var(--muted); margin-bottom: 6px; letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%; padding: 12px 14px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 10px; color: var(--text);
      font-family: inherit; font-size: 1rem;
      transition: border-color 0.15s;
      outline: none;
    }
    input[type="email"]:focus,
    input[type="password"]:focus { border-color: var(--accent); }
    input[type="email"]::placeholder,
    input[type="password"]::placeholder { color: #475569; }

    .terms-row {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 22px;
    }
    .terms-row input[type="checkbox"] {
      width: 16px; height: 16px; margin-top: 2px;
      accent-color: var(--accent); cursor: pointer; flex-shrink: 0;
    }
    .terms-row span {
      font-size: 0.82rem; color: var(--muted); line-height: 1.5;
    }
    .terms-row a { color: var(--accent); text-decoration: underline; }

    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--accent); color: #ffffff;
      border: none; border-radius: 10px;
      font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s, transform 0.15s;
    }
    .btn-submit:hover { background: #60a5fa; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border2);
    }

    .btn-google {
      width: 100%; padding: 12px;
      background: #fff; border: 1.5px solid var(--border2);
      border-radius: 10px; color: #1e293b;
      font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:hover { box-shadow: 0 0 0 2px rgba(66,133,244,0.35); border-color: #4285F4; }
    .btn-google:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-guest {
      width: 100%; padding: 12px;
      background: transparent; border: 1.5px solid var(--border2);
      border-radius: 10px; color: var(--muted);
      font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
      text-decoration: none; display: block; text-align: center;
    }
    .btn-guest:hover { border-color: var(--text); color: var(--text); }

    .forgot-link {
      text-align: right; margin-top: -10px; margin-bottom: 18px;
    }
    .forgot-link a {
      font-size: 0.8rem; color: var(--muted); text-decoration: none;
    }
    .forgot-link a:hover { color: var(--accent); }

    .remember-row {
      display: flex; align-items: center; gap: 9px;
      margin-bottom: 18px;
    }
    .remember-row input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--accent); cursor: pointer; flex-shrink: 0;
    }
    .remember-row label {
      font-size: 0.85rem; color: var(--muted); cursor: pointer;
      user-select: none;
    }

    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: var(--red); border-radius: 8px; padding: 10px 14px;
      font-size: 0.85rem; margin-bottom: 18px; display: none;
    }
    .error-msg.visible { display: block; }

    .success-msg {
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      color: var(--accent); border-radius: 8px; padding: 10px 14px;
      font-size: 0.85rem; margin-bottom: 18px; display: none;
    }
    .success-msg.visible { display: block; }
  </style>
</head>
<body>

  <a href="/" class="logo-wrap">
    <div class="logo-mark">
      <!-- courtdraw-icon-v7 pixel-perfect proportions -->
      <svg width="36" height="36" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="6" fill="#3b82f6"/>
        <rect x="2" y="8.5" width="24" height="11" rx="1" fill="#1d4ed8"/>
        <rect x="2" y="8.5" width="24" height="11" rx="1" stroke="white" stroke-width="0.9"/>
        <line x1="14" y1="8.5" x2="14" y2="19.5" stroke="white" stroke-width="0.9"/>
        <line x1="7.5" y1="9.8" x2="7.5" y2="18.2" stroke="white" stroke-width="0.75"/>
        <line x1="20.5" y1="9.8" x2="20.5" y2="18.2" stroke="white" stroke-width="0.75"/>
        <line x1="2" y1="9.8" x2="26" y2="9.8" stroke="white" stroke-width="0.75"/>
        <line x1="2" y1="18.2" x2="26" y2="18.2" stroke="white" stroke-width="0.75"/>
        <line x1="7.5" y1="14" x2="20.5" y2="14" stroke="white" stroke-width="0.75"/>
        <line x1="2" y1="14" x2="2.7" y2="14" stroke="white" stroke-width="0.75"/>
        <line x1="26" y1="14" x2="25.3" y2="14" stroke="white" stroke-width="0.75"/>
      </svg>
    </div>
    CourtDraw
  </a>

  <div class="card">
    <div class="card-header">
      <h1>Welcome back</h1>
      <p>Sign in to access your tactics library and Pro features.</p>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
    </div>

    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <!-- Sign in form -->
    <form id="form-signin" onsubmit="handleSignin(event)">
      <div class="form-group">
        <label for="signin-email">Email</label>
        <input type="email" id="signin-email" name="email" placeholder="coach@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="signin-password">Password</label>
        <input type="password" id="signin-password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div class="forgot-link">
        <a href="#" onclick="handleReset(event)">Forgot password?</a>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember-me" checked>
        <label for="remember-me">Stay signed in</label>
      </div>
      <button type="submit" class="btn-submit" id="signin-btn">Sign in</button>
    </form>

    <!-- Sign up form -->
    <form id="form-signup" style="display:none" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" name="email" placeholder="coach@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      </div>
      <div class="terms-row">
        <input type="checkbox" id="terms-accepted" name="terms-accepted" required>
        <span>I agree to the <a href="/terms.html" target="_blank">Terms of Service</a> and <a href="/privacy.html" target="_blank">Privacy Policy</a></span>
      </div>
      <button type="submit" class="btn-submit" id="signup-btn">Create account</button>
    </form>

    <div class="divider">or</div>
    <button class="btn-google" id="google-btn" onclick="handleGoogleSignin()">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    <div class="divider">or</div>
    <a href="/courtdraw-app.html" class="btn-guest">Continue without account</a>

    <div style="text-align:center;margin-top:20px;">
      <a href="/join-club.html" style="font-size:0.82rem;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:color .15s;"
         onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--muted)'">
        🔑 Have a club code? <span style="color:#3b82f6;font-weight:700;">Join a club →</span>
      </a>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
    }
  }
  </script>
  <script type="module">
    import { loginUser, registerUser } from '/src/auth.js';
    import { auth, db } from '/src/firebase.js';
    import { onAuthStateChanged, GoogleAuthProvider, signInWithPopup,
             setPersistence, browserLocalPersistence, browserSessionPersistence } from 'firebase/auth';
    import { doc, getDoc } from 'firebase/firestore';

    const params = new URLSearchParams(location.search);
    const explicitNext = params.get('next');
    const pendingPlan = params.get('checkout');
    if (pendingPlan) localStorage.setItem('courtdraw_pending_checkout', pendingPlan);

    let handlingAuth = false;
    // Snapshot of Google button inner HTML so we can restore it after a cancelled popup
    const googleBtnInner = `<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg> Continue with Google`;

    async function resolveRedirect(user) {
      if (explicitNext) { window.location.href = explicitNext; return; }
      if (localStorage.getItem('courtdraw_pending_checkout')) {
        window.location.href = '/courtdraw-app.html'; return;
      }
      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        const plan = snap.exists() ? (snap.data().plan || 'free') : 'free';
        window.location.href = plan === 'club' ? '/club-admin.html' : '/';
      } catch {
        window.location.href = '/';
      }
    }

    onAuthStateChanged(auth, user => {
      if (user && !handlingAuth) resolveRedirect(user);
    });

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('visible');
      document.getElementById('success-msg').classList.remove('visible');
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.classList.add('visible');
      document.getElementById('error-msg').classList.remove('visible');
    }

    function clearMessages() {
      document.getElementById('error-msg').classList.remove('visible');
      document.getElementById('success-msg').classList.remove('visible');
    }

    window.switchTab = (tab) => {
      clearMessages();
      document.getElementById('form-signin').style.display = tab === 'signin' ? '' : 'none';
      document.getElementById('form-signup').style.display = tab === 'signup' ? '' : 'none';
      document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      const h1 = document.querySelector('.card-header h1');
      const sub = document.querySelector('.card-header p');
      if (tab === 'signin') {
        h1.textContent = 'Welcome back';
        sub.textContent = 'Sign in to access your tactics library and Pro features.';
      } else {
        h1.textContent = 'Create your account';
        sub.textContent = 'Free to start — no credit card required.';
      }
    };

    function rememberMe() {
      return document.getElementById('remember-me')?.checked !== false;
    }

    window.handleSignin = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signin-btn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      clearMessages();
      handlingAuth = true;
      try {
        await setPersistence(auth, rememberMe() ? browserLocalPersistence : browserSessionPersistence);
        const credential = await loginUser(
          document.getElementById('signin-email').value,
          document.getElementById('signin-password').value
        );
        await resolveRedirect(credential.user);
      } catch (err) {
        handlingAuth = false;
        showError(friendlyError(err.code));
        btn.disabled = false; btn.textContent = 'Sign in';
      }
    };

    window.handleSignup = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      btn.disabled = true; btn.textContent = 'Creating account…';
      clearMessages();
      handlingAuth = true;
      try {
        const newUser = await registerUser(
          document.getElementById('signup-email').value,
          document.getElementById('signup-password').value
        );

        // Await the email send before redirecting — avoids navigation cancelling
        // the request. Errors are silently ignored so signup always completes.
        try {
          const idToken = await newUser.getIdToken();
          await fetch('/api/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + idToken },
            body: JSON.stringify({
              template: 'welcome',
              email: document.getElementById('signup-email').value
            })
          });
        } catch {}

        await resolveRedirect(newUser);
      } catch (err) {
        handlingAuth = false;
        showError(friendlyError(err.code));
        btn.disabled = false; btn.textContent = 'Create account';
      }
    };

    window.handleGoogleSignin = async () => {
      const btn = document.getElementById('google-btn');
      btn.disabled = true; btn.textContent = 'Opening Google…';
      clearMessages();
      handlingAuth = true;
      try {
        await setPersistence(auth, rememberMe() ? browserLocalPersistence : browserSessionPersistence);
        const provider = new GoogleAuthProvider();
        const result = await signInWithPopup(auth, provider);
        await resolveRedirect(result.user);
      } catch (err) {
        handlingAuth = false;
        // Ignore popup-closed — user just dismissed it
        if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
          showError(friendlyError(err.code));
        }
        btn.disabled = false;
        btn.innerHTML = googleBtnInner;
      }
    };

    window.handleReset = async (e) => {
      e.preventDefault();
      const email = document.getElementById('signin-email').value.trim();
      if (!email) { showError('Enter your email address above first.'); return; }
      try {
        await fetch('/api/send-reset-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        // Always show success — don't reveal whether the account exists
        showSuccess('If an account exists for that email, a reset link is on its way.');
      } catch {
        showError('Could not send reset email — please try again.');
      }
    };

    function friendlyError(code) {
      const map = {
        'auth/invalid-credential': 'Incorrect email or password.',
        'auth/user-not-found': 'No account found with that email.',
        'auth/wrong-password': 'Incorrect password.',
        'auth/email-already-in-use': 'An account with this email already exists.',
        'auth/weak-password': 'Password must be at least 8 characters.',
        'auth/too-many-requests': 'Too many attempts. Please try again later.',
        'auth/network-request-failed': 'Network error. Check your connection.',
        'auth/wrong-provider': 'This account uses Google sign-in. Please use "Continue with Google" instead.',
        'auth/account-exists-with-different-credential': 'This email is linked to a different sign-in method. Please sign in with Google.',
        'auth/popup-closed-by-user': 'Sign-in popup was closed. Please try again.',
        'auth/cancelled-popup-request': 'Sign-in popup was closed. Please try again.',
        'auth/popup-blocked': 'Pop-up was blocked by your browser. Please allow pop-ups and try again.'
      };
      console.debug('[auth error code]', code);
      return map[code] || 'Something went wrong. Please try again.';
    }
  </script>

</body>
</html>
